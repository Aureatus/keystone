openapi: 3.1.0
info:
  title: Keystone Service Map API
  version: 0.1.0
  description: Experimental API contract for resolving a Keystone service map from
    a manifest. This schema exists so non-TypeScript consumers such as Hive's
    Elixir backend can rely on a stable wire format even though Keystone's
    authoring experience is TypeScript-first.
servers:
  - url: http://localhost:4010
components:
  schemas:
    ServiceMapServiceContext:
      type: object
      properties:
        enabled:
          type: boolean
        bindHost:
          type: string
        bindPort:
          type: integer
          exclusiveMinimum: 0
        connectHost:
          type: string
        connectPort:
          type: integer
          exclusiveMinimum: 0
        preferredPort:
          type: integer
          exclusiveMinimum: 0
        publicUrl:
          type: string
        portlessAlias:
          type: string
        serviceName:
          type: string
    ServiceMapContext:
      type: object
      properties:
        projectName:
          type: string
        cellId:
          type: string
        cellName:
          type: string
        worktreePath:
          type: string
        portless:
          type: object
          properties:
            proxyPort:
              type: integer
              exclusiveMinimum: 0
            https:
              type: boolean
            rootName:
              type: string
        services:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ServiceMapServiceContext"
    ResolveServiceMapRequest:
      type: object
      properties:
        manifestPath:
          type: string
          minLength: 1
          description: Absolute or repo-relative path to `env.manifest.ts`.
        repoRoot:
          type: string
          minLength: 1
          description: Optional override for repository root.
        env:
          $ref: "#/components/schemas/EnvMap"
        context:
          allOf:
            - $ref: "#/components/schemas/ServiceMapContext"
            - description: Structured runtime context used to resolve the service map.
      required:
        - manifestPath
    EnvMap:
      type: object
      additionalProperties:
        type: string
      description: Optional environment overrides applied before service-map resolution.
    ServiceEndpoint:
      type: object
      properties:
        host:
          type: string
        port:
          type: integer
          exclusiveMinimum: 0
      required:
        - host
        - port
    ResolvedService:
      type: object
      properties:
        name:
          type: string
        protocol:
          type: string
          enum:
            - http
            - https
            - ws
            - wss
            - postgres
            - redis
            - mysql
            - tcp
        runtime:
          type: string
          enum:
            - local-process
            - docker-published
            - docker-network
        exposure:
          type: string
          enum:
            - direct
            - portless
            - none
        bind:
          allOf:
            - $ref: "#/components/schemas/ServiceEndpoint"
            - type:
                - object
                - "null"
        connect:
          $ref: "#/components/schemas/ServiceEndpoint"
        internalUrl:
          type:
            - string
            - "null"
        publicUrl:
          type:
            - string
            - "null"
        env:
          $ref: "#/components/schemas/EnvMap"
      required:
        - name
        - protocol
        - runtime
        - exposure
        - connect
        - env
    PortlessAliasPlan:
      type: object
      properties:
        service:
          type: string
        hostname:
          type: string
        port:
          type: integer
          exclusiveMinimum: 0
      required:
        - service
        - hostname
        - port
    ResolvedServiceMap:
      type: object
      properties:
        schemaVersion:
          type: string
        services:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ResolvedService"
        env:
          $ref: "#/components/schemas/EnvMap"
        warnings:
          type: array
          items:
            type: string
        portlessAliases:
          type: array
          items:
            $ref: "#/components/schemas/PortlessAliasPlan"
      required:
        - schemaVersion
        - services
        - env
        - warnings
        - portlessAliases
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
  parameters: {}
paths:
  /v1/service-map/resolve:
    post:
      summary: Resolve a service map for a Keystone manifest
      operationId: resolveServiceMap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveServiceMapRequest"
      responses:
        "200":
          description: Resolved service map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolvedServiceMap"
        "400":
          description: Invalid manifest or service-map request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
webhooks: {}
